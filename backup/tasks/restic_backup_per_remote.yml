- name: Check if restic repository exists for {{ remote.name }}
  ansible.builtin.shell: |
    rclone lsd "{{ rclone_path }}" || true
  register: repo_check
  environment: "{{ remote.env | combine(global_restic_env) }}"
  changed_when: false
- name: Initialize restic repository if missing ({{ remote.name }})
  ansible.builtin.command: >
    restic -r "{{ repo }}" init
  environment: "{{ remote.env | combine(global_restic_env) }}"
  register: restic_init_result
  when: repo_check.stdout == ""
  changed_when: "'created restic repository' in restic_init_result.stdout"
- name: Run restic backup to {{ remote.name }}
  ansible.builtin.command: >
    restic -r "{{ repo }}"
    backup {{ backup_paths | join(' ') }}
    {% if restic_ignore_patterns is defined %}
    {% for pattern in restic_ignore_patterns %}
    --exclude '{{ pattern }}'
    {% endfor %}
    {% endif %}
    {% if restic_tags is defined %}
    {% for tag in restic_tags %}
    --tag '{{ tag }}'
    {% endfor %}
    {% endif %}
    --host "{{ inventory_hostname }}"
    {% if dry_run | default(false) %}--dry-run{% endif %}
    --verbose
  environment: "{{ remote.env | combine(global_restic_env) }}"
  register: restic_backup
  # rc 3: backup finished, some files were unreadable or changed mid-read
  # (restic's "operation completed with error"). Don't retry or fail for that.
  changed_when: restic_backup.rc in [0, 3]
  failed_when: false
  retries: "{{ backup_retries | default(3) }}"
  delay: "{{ backup_retry_delay | default(60) }}"
  until: restic_backup.rc in [0, 3]
- name: Show restic backup output ({{ remote.name }})
  ansible.builtin.debug:
    msg:
      - "{{ restic_backup.stdout }}"
      - "{{ restic_backup.stderr }}"
- name: Track failed remotes
  ansible.builtin.set_fact:
    failed_remotes: "{{ (failed_remotes | default([])) + [remote.name] }}"
  when: restic_backup.rc not in [0, 3]
