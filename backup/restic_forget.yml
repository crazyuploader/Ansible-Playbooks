---
- name: Restic Forget/Prune for all remotes
  hosts: all
  vars_files:
    - "{{ vars_file | default('vars/config.yml') }}"
  tasks:
    - name: Iterate over each rclone remote and forget/prune
      ansible.builtin.include_tasks: tasks/restic_forget_per_remote.yml
      loop: "{{ rclone_remotes }}"
      loop_control:
        loop_var: remote
        label: "{{ remote.name }}"
      vars:
        repo_path: "{{ [remote.repo_prefix | default('backup-restic'), inventory_hostname | lower] | select | join('/') }}"
        repo: "rclone:{{ remote.name }}:{{ repo_path }}"
        rclone_path: "{{ remote.name }}:{{ repo_path }}"

    - name: Fail if any remotes failed
      ansible.builtin.fail:
        msg: "Forget/prune failed for remotes: {{ failed_forget_remotes | join(', ') }}"
      when: failed_forget_remotes | default([]) | length > 0
